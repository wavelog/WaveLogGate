name: Release Build

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/arm64
            artifact: WavelogGate-darwin-arm64
          - os: macos-latest
            platform: darwin/amd64
            artifact: WavelogGate-darwin-amd64
          - os: windows-latest
            platform: windows/amd64
            artifact: WavelogGate-windows-amd64-x64
          - os: windows-latest
            platform: windows/386
            artifact: WavelogGate-windows-i386-x86
          - os: windows-latest
            platform: windows/arm64
            artifact: WavelogGate-windows-arm64
          - os: ubuntu-22.04
            platform: linux/amd64
            artifact: WavelogGate-linux-amd64-webkit4.0
            webkit_pkg: libwebkit2gtk-4.0-dev
            webkit_tags: ''
          - os: ubuntu-24.04
            platform: linux/amd64
            artifact: WavelogGate-linux-amd64-webkit4.1
            webkit_pkg: libwebkit2gtk-4.1-dev
            webkit_tags: '-tags webkit2_41'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev ${{ matrix.webkit_pkg }}

      - name: Install Linux packaging tools (rpm)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y rpm
          sudo gem install --no-document fpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          wails build -clean -platform ${{ matrix.platform }} ${{ matrix.webkit_tags }} -ldflags "-X main.appVersion=${VERSION}"

      - name: Sign (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::notice::APPLE_CERTIFICATE not set — skipping code signing"
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12
          CERT_NAME=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Signing with: $CERT_NAME"
          /usr/bin/codesign --force --options runtime \
            --entitlements build/darwin/entitlements.plist \
            -s "$CERT_NAME" \
            --deep "build/bin/WavelogGate.app"

      - name: Package (macOS — create DMG)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg

          # create-dmg builds a styled DMG with the /Applications symlink, icon
          # positions and our background (restores the layout we had pre-2.0).
          # It occasionally returns a non-zero status even on success (e.g. when
          # it cannot toggle internet-enable), so verify the output file instead.
          create-dmg \
            --volname "WavelogGate" \
            --background build/darwin/dmg-background.png \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "WavelogGate.app" 165 205 \
            --app-drop-link 495 205 \
            --no-internet-enable \
            "${{ matrix.artifact }}.dmg" \
            "build/bin/WavelogGate.app" || true

          test -f "${{ matrix.artifact }}.dmg"

      - name: Notarize (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_ID" ]; then
            echo "::notice::Notarization secrets not set — skipping"
            exit 0
          fi
          xcrun notarytool submit ${{ matrix.artifact }}.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait
          xcrun stapler staple ${{ matrix.artifact }}.dmg

      - name: Package (Linux — create .deb and .rpm)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          REF="${{ github.ref_name }}"
          VERSION="${REF#v}"
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then
            VERSION="0.0.0"
          fi
          WK="${{ matrix.artifact == 'WavelogGate-linux-amd64-webkit4.1' && 'webkit4.1' || 'webkit4.0' }}"
          PKG="wavelog-gate_${VERSION}_${WK}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/local/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/icons/hicolor/256x256/apps"

          cp build/bin/WavelogGate "${PKG}/usr/local/bin/wavelog-gate"
          cp build/appicon.png "${PKG}/usr/share/icons/hicolor/256x256/apps/wavelog-gate.png"

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=WavelogGate' \
            'Comment=Amateur radio gateway to Wavelog' \
            'Exec=/usr/local/bin/wavelog-gate' \
            'Icon=wavelog-gate' \
            'Type=Application' \
            'Categories=HamRadio;Network;' \
            > "${PKG}/usr/share/applications/wavelog-gate.desktop"

          printf 'Package: wavelog-gate\nVersion: %s\nArchitecture: amd64\nMaintainer: Joerg <joerg@dj7nt.de>\nHomepage: https://github.com/wavelog/WaveLogGate\nDescription: WavelogGate\n Connects WSJT-X/FLDigi and FLRig/Hamlib to Wavelog web logging platform.\n' \
            "${VERSION}" > "${PKG}/DEBIAN/control"

          dpkg-deb --build "${PKG}"

          # Build the .rpm from the same staging tree (excludes DEBIAN/)
          fpm -s dir -t rpm \
            -n wavelog-gate \
            -v "${VERSION}" \
            --iteration "${WK}" \
            -a x86_64 \
            -m "Joerg <joerg@dj7nt.de>" \
            --vendor "Joerg <joerg@dj7nt.de>" \
            --license "MIT" \
            --url "https://github.com/wavelog/WaveLogGate" \
            --description "Connects WSJT-X/FLDigi and FLRig/Hamlib to Wavelog web logging platform." \
            -p "wavelog-gate-${VERSION}-${WK}.x86_64.rpm" \
            -C "${PKG}" \
            usr

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.dmg

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        run: cp build/bin/WavelogGate.exe ${{ matrix.artifact }}.exe
        shell: bash
      - uses: actions/upload-artifact@v5
        if: runner.os == 'Windows'
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.exe

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.deb
            *.rpm

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/WavelogGate-darwin-arm64/*.dmg
            artifacts/WavelogGate-darwin-amd64/*.dmg
            artifacts/WavelogGate-windows-amd64-x64/WavelogGate-windows-amd64-x64.exe
            artifacts/WavelogGate-windows-i386-x86/WavelogGate-windows-i386-x86.exe
            artifacts/WavelogGate-windows-arm64/WavelogGate-windows-arm64.exe
            artifacts/WavelogGate-linux-amd64-webkit4.0/*.deb
            artifacts/WavelogGate-linux-amd64-webkit4.1/*.deb
            artifacts/WavelogGate-linux-amd64-webkit4.0/*.rpm
            artifacts/WavelogGate-linux-amd64-webkit4.1/*.rpm

  aur:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Update pkgver
        run: |
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur/waveloggate-git/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur/waveloggate-bin/PKGBUILD

      - name: Publish waveloggate-git to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: waveloggate-git
          pkgbuild: aur/waveloggate-git/PKGBUILD
          commit_username: ${{ github.actor }}
          commit_email: fabian.berg@hb9hil.org
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to v${{ env.VERSION }}
          updpkgsums: true

      - name: Publish waveloggate-bin to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: waveloggate-bin
          pkgbuild: aur/waveloggate-bin/PKGBUILD
          commit_username: ${{ github.actor }}
          commit_email: fabian.berg@hb9hil.org
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to v${{ env.VERSION }}
          updpkgsums: true
