name: BuildnPub_WLGate
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  build_on_linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set dynamic repository
      run: |
        node -e "let p=require('./package.json'); p.repository={type:'git',url:'https://github.com/${GITHUB_REPOSITORY}.git'}; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2));"
    - name: install dependencies
      run: npm install
    - name: build and publish x64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx electron-forge publish --platform linux --arch=x64
    - name: build and publish armhf
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx electron-forge publish --platform linux --arch=armv7l
    - name: build and publish arm64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx electron-forge publish --platform linux --arch=arm64

  build_on_mac:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: set dynamic repository
      run: |
        node -e "let p=require('./package.json'); p.repository={type:'git',url:'https://github.com/${GITHUB_REPOSITORY}.git'}; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2));"
    - name: setup python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12
    - name: setup appdmg
      run: |
        python3 -m pip install setuptools
        npm install -g appdmg@0.6.6
    - name: install dependencies
      run: npm install
    - name: import signing certificate
      env:
        APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      run: |
        if [ -n "$APPLE_CERTIFICATE" ]; then
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12
          echo "APPLE_SIGN=true" >> $GITHUB_ENV
          echo "Signing certificate imported"
        else
          echo "No signing certificate found, building unsigned"
        fi
    - name: build and publish arm64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: npx electron-forge publish --arch=arm64
    - name: build and publish x64
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: npx electron-forge publish --arch=x64

  build_on_win:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: set dynamic repository
      shell: pwsh
      run: |
        $repoUrl = "https://github.com/$env:GITHUB_REPOSITORY.git"
        node -e "let p=require('./package.json'); p.repository={type:'git',url:'$repoUrl'}; require('fs').writeFileSync('./package.json', JSON.stringify(p, null, 2));"
    - name: install dependencies
      run: npm install
    - name: build and publish
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npx electron-forge publish
